*{box-sizing:border-box;margin:0;padding:0}
body{background:#F3F0FB;min-height:100vh;font-family:'Segoe UI','Tahoma',Arial,sans-serif;color:#1A0A2E}
input,button,select{font-family:inherit}
input::placeholder{color:#B5AAD4}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:#D8CEF5;border-radius:4px}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{opacity:0;transform:translateY(40px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
.sf-spinner{width:52px;height:52px;border:5px solid rgba(255,255,255,0.2);border-top:5px solid white;border-radius:50%;animation:spin 0.9s linear infinite}
.fade-up{animation:fadeUp 0.4s ease}
.slide-up{animation:slideUp 0.28s cubic-bezier(.4,0,.2,1)}
.card{background:#fff;border-radius:18px;box-shadow:0 2px 12px rgba(108,31,201,0.07);border:1px solid #EDE8F8;transition:all 0.22s cubic-bezier(.4,0,.2,1)}
.card.hoverable:hover{box-shadow:0 8px 28px rgba(108,31,201,0.14);transform:translateY(-2px);cursor:pointer}
.overlay{position:fixed;inset:0;background:rgba(26,10,46,0.55);z-index:9000;display:flex;align-items:flex-end;backdrop-filter:blur(5px)}
.sheet{background:#fff;width:100%;max-width:480px;margin:0 auto;border-radius:28px 28px 0 0;max-height:92vh;display:flex;flex-direction:column}
.btn-grad{border:none;border-radius:18px;background:linear-gradient(135deg,#C92A8F,#6C1FC9);color:white;font-weight:800;cursor:pointer;font-family:inherit;transition:all 0.2s}
.btn-grad:hover{opacity:0.9;transform:translateY(-1px)}
.toggle-track{width:44px;height:24px;border-radius:99px;position:relative;cursor:pointer;transition:background 0.3s;flex-shrink:0}
.toggle-thumb{position:absolute;top:2px;width:20px;height:20px;border-radius:50%;background:white;transition:left 0.25s ease;box-shadow:0 1px 4px rgba(0,0,0,0.2)}
.progress-wrap{background:#EDE8F8;border-radius:100px;overflow:hidden;width:100%}
.progress-bar{height:100%;border-radius:100px;transition:width 0.8s cubic-bezier(.4,0,.2,1)}
.nav-btn{background:none;border:none;display:flex;flex-direction:column;align-items:center;gap:3px;font-size:9px;font-weight:700;cursor:pointer;font-family:inherit;min-width:48px;padding-bottom:2px;transition:color 0.2s}
.drawer-link{display:flex;align-items:center;gap:14px;padding:13px 14px;border-radius:14px;margin-bottom:4px;cursor:pointer;color:#7B6FA3;transition:background 0.15s}
.drawer-link:hover{background:#F3F0FB}
.settings-row{display:flex;align-items:center;padding:14px 18px;gap:14px;transition:background 0.15s;cursor:default}
.settings-row.clickable:hover{background:#FAF8FF;cursor:pointer}
.chip{padding:7px 16px;border-radius:99px;border:1.5px solid;font-weight:700;font-size:13px;cursor:pointer;white-space:nowrap;transition:all 0.2s;flex-shrink:0;font-family:inherit}
.range-chip{flex:1;padding:7px 4px;border-radius:10px;border:none;font-weight:700;font-size:12px;cursor:pointer;font-family:inherit;transition:all 0.18s}
.modal-center{position:fixed;inset:0;background:rgba(26,10,46,0.5);z-index:9000;display:flex;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(6px)}
#processing-overlay{position:fixed;inset:0;background:rgba(26,10,46,0.65);z-index:7000;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;backdrop-filter:blur(8px)}
#processing-overlay p{color:white;font-weight:700;font-size:16px}
</style>

function safeToSpend(){
  const {monthlyBudget,spent,monthlyRecurring,savingsAllocated}=STATE.finances;
  const now=new Date();
  const daysInMonth=new Date(now.getFullYear(),now.getMonth()+1,0).getDate();
  const daysLeft=Math.max(1,daysInMonth-now.getDate());
  const safeTotal=Math.max(0,monthlyBudget-monthlyRecurring-savingsAllocated-spent);
  return{safeTotal,safeToday:safeTotal/daysLeft,safeWeekly:(safeTotal/daysLeft)*7,daysLeft};
}

function goBack(){if(STATE.history.length===0)return;STATE.tab=STATE.history.pop();render();}

function h(tag,attrs,inner){
  const a=Object.entries(attrs||{}).map(([k,v])=>{
    if(k==="style"&&typeof v==="object")return` style="${Object.entries(v).map(([sk,sv])=>sk.replace(/([A-Z])/g,m=>'-'+m.toLowerCase())+':'+sv).join(';')}"`;
    if(k.startsWith("data-"))return` ${k}="${v}"`;
    if(k==="className")return` class="${v}"`;
    if(typeof v==="boolean")return v?` ${k}`:"";
    return` ${k}="${v}"`;
  }).join("");
  const selfClose=["input","br","hr","img"].includes(tag);
  if(selfClose)return`<${tag}${a}/>`;
  return`<${tag}${a}>${inner||""}</${tag}>`;
}

function progress(val,max,color,thin=false){
  const pct=Math.min(100,Math.round((val/max)*100));
  const bg=color||(pct>90?C.danger:pct>70?C.warning:getAccent().grad);
  return`<div class="progress-wrap" style="height:${thin?4:8}px"><div class="progress-bar" style="width:${pct}%;background:${bg};height:100%"></div></div>`;
}

function gradBadge(text){
  const acc=getAccent();
  return`<span style="background:${acc.grad};color:white;border-radius:100px;padding:3px 12px;font-size:11px;font-weight:700;display:inline-block">${text}</span>`;
}

function toggle(id,on){
  const acc=getAccent();
  return`<div class="toggle-track" style="background:${on?acc.primary:C.border}" data-toggle="${id}"><div class="toggle-thumb" style="left:${on?22:2}px"></div></div>`;
}

  let goalsHtml=goals.map(g=>{

    });
    insightsHtml+="</div>";
  }

  return`<div class="fade-up" style="display:flex;flex-direction:column;gap:20px">
    <div style="display:flex;gap:6px">${rangeChipsHtml}</div>
    <div style="display:flex;gap:7px;overflow-x:auto;scrollbar-width:none;padding-bottom:2px">${monthGridHtml}</div>
    <div style="display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none">${bankChipsHtml}</div>
    <div style="background:${acc.grad};border-radius:24px;padding:26px 24px 22px;color:white;position:relative;overflow:hidden">
      <div style="position:absolute;top:-40px;right:-40px;width:170px;height:170px;border-radius:50%;background:rgba(255,255,255,0.07);pointer-events:none"></div>
      <div style="position:absolute;bottom:-60px;left:-30px;width:210px;height:210px;border-radius:50%;background:rgba(255,255,255,0.05);pointer-events:none"></div>
      <div style="position:relative">
        <div style="font-size:11px;opacity:0.8;letter-spacing:1px;text-transform:uppercase;margin-bottom:4px">${t.totalBalance}</div>
        <div style="font-size:38px;font-weight:900;letter-spacing:-1px;margin-bottom:16px">${fmt(totalBalance)}</div>
        <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:12px">
          ${[{l:t.safeToday,v:fmt(s.safeToday)},{l:t.safeWeekly,v:fmt(s.safeWeekly)},{l:t.daysLeft,v:`${s.daysLeft} 📅`}].map(x=>`
          <div style="background:rgba(255,255,255,0.13);border-radius:12px;padding:9px 10px;backdrop-filter:blur(8px)">

            <div style="font-weight:900;font-size:13px">${x.v}</div>

        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
          ${[{l:t.monthlyBudget,v:finances.monthlyBudget},{l:t.spent,v:finances.spent}].map(x=>`

            <div style="font-size:10px;opacity:0.7;margin-bottom:2px">${x.l}</div>
            <div style="font-weight:700;font-size:14px">${fmt(x.v)}</div>

    </div>
    <div class="card" style="padding:16px 18px">

      </div>
      ${progress(finances.spent,finances.monthlyBudget,null)}

function renderActivity(){
  const t=getT2(),acc=getAccent();
  const {transactions,recurringItems}=STATE;
  const view=STATE._actView||"transactions";
  const query=STATE._actQuery||"";
  const filter=STATE._actFilter||"all";
  const today=new Date().getDate();
  const filteredTx=transactions.filter(tx=>{
    const mQ=tx.merchant.toLowerCase().includes(query.toLowerCase())||tx.category.toLowerCase().includes(query.toLowerCase());
    const mF=filter==="all"||(filter==="income"?tx.amount>0:tx.amount<0);
    return mQ&&mF;
  });
  const sortedBills=[...recurringItems].sort((a,b)=>{
    const da=a.dueDay>=today?a.dueDay-today:30+a.dueDay-today;
    const db=b.dueDay>=today?b.dueDay-today:30+b.dueDay-today;
    return da-db;
  });
  const totalRecurring=recurringItems.reduce((s,b)=>s+b.amount,0);

  const txHtml=filteredTx.length===0
    ?`<div style="text-align:center;padding:50px;color:${C.textMuted}"><div style="font-size:36px;margin-bottom:10px">🔍</div><div style="font-weight:600">${t.noResults}</div></div>`
    :filteredTx.map(tx=>`<div class="card hoverable" style="display:flex;align-items:center;gap:14px;padding:13px 16px;margin-bottom:8px">
      <div style="width:44px;height:44px;border-radius:13px;background:${tx.amount>0?C.success+"18":C.danger+"10"};display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0">${tx.icon}</div>
      <div style="flex:1"><div style="font-weight:700;font-size:14px;color:${C.textPrimary}">${tx.merchant}</div>
      <div style="font-size:11px;color:${C.textSecondary};margin-top:3px">${tx.category} · ${tx.date}</div></div>
      <div style="font-weight:800;font-size:14px;color:${tx.amount>0?C.success:C.textPrimary}">${tx.amount>0?"+":""}${fmt(Math.abs(tx.amount))}</div>
    </div>`).join("");

  const billsHtml=sortedBills.map((bill,i)=>{
    const du=bill.dueDay>=today?bill.dueDay-today:30-today+bill.dueDay;
    const isUrgent=du<=2;
    return`<div class="card hoverable" style="padding:15px 16px;margin-bottom:8px">
      <div style="display:flex;align-items:center;gap:14px">
        <div style="width:44px;height:44px;border-radius:13px;background:${bill.color}22;border:2px solid ${bill.color}44;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0">${bill.icon}</div>
        <div style="flex:1">
          <div style="display:flex;justify-content:space-between;align-items:flex-start">
            <div><div style="font-weight:700;font-size:14px;color:${C.textPrimary}">${bill.name}</div>
            <div style="font-size:11px;color:${C.textSecondary};margin-top:2px">${t.dueOn}${bill.dueDay} ${t.ofMonth}</div></div>
            <div style="text-align:right"><div style="font-weight:800;font-size:15px;color:${C.textPrimary}">${fmt(bill.amount)}</div>
            <div style="font-size:11px;color:${isUrgent?C.danger:C.textMuted};font-weight:${isUrgent?700:400};margin-top:2px">${du===0?t.dueToday:`${du} ${t.daysLeft}`}</div></div>
          </div>
          <div style="margin-top:8px">${progress(30-du,30,bill.color,true)}</div>
        </div>
      </div>
    </div>`;
  }).join("");

  return`<div class="fade-up" style="display:flex;flex-direction:column;gap:16px">
    <div style="display:flex;background:${C.border};border-radius:14px;padding:4px;gap:4px">
      ${[["transactions",`📋 ${t.transactions}`],["bills",`💸 ${t.bills}`]].map(([key,label])=>`
      <button onclick="STATE._actView='${key}';render()" style="flex:1;padding:9px 0;border-radius:10px;border:none;background:${view===key?C.surface:"transparent"};color:${view===key?C.textPrimary:C.textMuted};font-weight:700;font-size:13px;cursor:pointer;font-family:inherit;box-shadow:${view===key?"0 2px 12px rgba(108,31,201,0.07)":"none"};transition:all 0.18s">${label}</button>`).join("")}
    </div>
    ${view==="transactions"?`
      <div style="position:relative">
        <span style="position:absolute;top:50%;transform:translateY(-50%);left:14px;font-size:15px;pointer-events:none">🔍</span>
        <input value="${query}" oninput="STATE._actQuery=this.value;render()" placeholder="${t.search}"
          style="width:100%;padding:11px 16px 11px 44px;border:1.5px solid ${C.border};border-radius:18px;font-size:14px;background:${C.surface};color:${C.textPrimary};outline:none;box-sizing:border-box;font-family:inherit"/>
      </div>
      <div style="display:flex;gap:8px">
        ${[["all",t.allTransactions],["income",t.income],["expense",t.expenses]].map(([key,label])=>`
        <button onclick="STATE._actFilter='${key}';render()" style="padding:6px 14px;border-radius:100px;border:none;background:${filter===key?acc.grad:C.border};color:${filter===key?"white":C.textSecondary};font-weight:600;font-size:12px;cursor:pointer;font-family:inherit;transition:all 0.18s">${label}</button>`).join("")}
      </div>
      ${txHtml}
    `:`
      <div style="background:${acc.grad};border-radius:20px;padding:18px 20px;color:white">
        <div style="font-size:11px;opacity:0.8;letter-spacing:1px;text-transform:uppercase;margin-bottom:4px">${t.recurringPayments}</div>
        <div style="font-size:26px;font-weight:900">${fmt(totalRecurring)}</div>
        <div style="font-size:11px;opacity:0.7;margin-top:3px">Monthly</div>
      </div>
      ${billsHtml}
    `}
  </div>`;
}

function renderStats(){
  const t=getT2(),acc=getAccent();
  const {monthlyData,categoryData}=STATE;
  const maxVal=Math.max(...monthlyData.map(m=>Math.max(m.income,m.expenses)));
  const rd=RANGE_DATA[STATE.timeRange]||RANGE_DATA.month;
  const daysDiv=STATE.timeRange==="week"?7:STATE.timeRange==="quarter"?90:STATE.timeRange==="year"?365:30;

  const barChart=monthlyData.map((m,i)=>`
    <div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:4px">
      <div style="display:flex;gap:2px;align-items:flex-end;height:84px">
        <div style="width:44%;height:${Math.max(4,(m.income/maxVal)*84)}px;background:${C.success};border-radius:4px 4px 0 0;opacity:0.85"></div>
        <div style="width:44%;height:${Math.max(4,(m.expenses/maxVal)*84)}px;background:${C.danger};border-radius:4px 4px 0 0;opacity:0.75"></div>
      </div>
      <div style="font-size:9px;color:${C.textSecondary}">${m.month}</div>
    </div>`).join("");

  const catRows=categoryData.map(cat=>`
    <div style="margin-bottom:13px">
      <div style="display:flex;justify-content:space-between;margin-bottom:5px">
        <span style="font-size:13px;font-weight:600;color:${C.textPrimary}">${cat.name}</span>
        <div style="display:flex;gap:8px;align-items:center">
          <span style="font-size:12px;color:${C.textSecondary}">${fmt(cat.amount)}</span>
          <span style="font-size:11px;font-weight:700;color:${cat.color};background:${cat.color}18;padding:1px 7px;border-radius:20px">${cat.pct}%</span>
        </div>
      </div>
      ${progress(cat.pct,100,cat.color,true)}
    </div>`).join("");

  const stats=[
    {label:"Saved",value:fmt(8649),icon:"💰",color:C.success},
    {label:"Transactions",value:String(STATE.transactions.length),icon:"🔄",color:"#4A90E2"},
    {label:"Daily Avg",value:fmt(Math.round(rd.expenses/daysDiv)),icon:"📅",color:"#9B59B6"},
  ];

  return`<div class="fade-up" style="display:flex;flex-direction:column;gap:20px">
    <div class="card" style="padding:18px 16px">
      <h3 style="margin:0 0 16px;color:${C.textPrimary};font-weight:700">${t.monthlyOverview}</h3>
      <div style="display:flex;align-items:flex-end;gap:6px;height:110px">${barChart}</div>
      <div style="display:flex;gap:16px;justify-content:center;margin-top:10px">
        ${[[C.success,t.income],[C.danger,t.expenses]].map(([col,label])=>`<div style="display:flex;align-items:center;gap:6px;font-size:12px;color:${C.textSecondary}"><div style="width:10px;height:10px;border-radius:3px;background:${col}"></div>${label}</div>`).join("")}
      </div>
    </div>
    <div class="card" style="padding:18px 16px">
      <h3 style="margin:0 0 14px;color:${C.textPrimary};font-weight:700">${t.spendingByCategory}</h3>
      ${catRows}
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px">
      ${stats.map(s=>`<div class="card" style="padding:13px 10px;text-align:center"><div style="font-size:20px;margin-bottom:5px">${s.icon}</div><div style="font-size:13px;font-weight:800;color:${s.color};margin-bottom:2px">${s.value}</div><div style="font-size:10px;color:${C.textSecondary}">${s.label}</div></div>`).join("")}
    </div>
  </div>`;
}

// ═══════════════════════════════════════════════
// CLAUDE API FILE ANALYSIS
// ═══════════════════════════════════════════════
async function analyzeFile(file){
  const isImage=file.type.startsWith("image/");
  const isPDF=file.type==="application/pdf"||file.name.endsWith(".pdf");
  const base64=await new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result.split(",")[1]);r.onerror=()=>rej(new Error("Read failed"));r.readAsDataURL(file);});
  const mimeType=file.type||(isPDF?"application/pdf":"image/jpeg");
  const system=`You are a financial document analyzer. Extract ALL transactions from the provided bank statement or receipt. Return ONLY a valid JSON array — no markdown, no explanation. Each object: merchant(string), amount(number, negative=expense), date(YYYY-MM-DD), category(one of: Groceries,Food,Restaurant,Entertainment,Transport,Shopping,Health,Income,Rent,Utilities,Insurance,Subscription,Travel,Education,Other). If none found, return: []`;
  const userContent=isImage
    ?[{type:"image",source:{type:"base64",media_type:mimeType,data:base64}},{type:"text",text:"Extract all financial transactions. Return only a JSON array."}]
    :isPDF
    ?[{type:"document",source:{type:"base64",media_type:"application/pdf",data:base64}},{type:"text",text:"Extract all financial transactions. Return only a JSON array."}]
    :[{type:"text",text:"No valid file. Return []."}];
  const resp=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,system,messages:[{role:"user",content:userContent}]})});
  if(!resp.ok)throw new Error(`API ${resp.status}`);
  const data=await resp.json();
  const text=data.content.map(b=>b.text||"").join("").trim().replace(/```json|```/g,"").trim();
  const parsed=JSON.parse(text);
  return Array.isArray(parsed)?parsed:[];
}

  try{

}

      </div>
      <div style="font-size:13px;color:${C.textSecondary};margin-bottom:14px;flex-shrink:0">${t.found.replace("{n}",transactions.length)}</div>
      <div id="sync-tx-list" style="overflow-y:auto;flex:1;background:${C.bg};border-radius:16px;margin-bottom:16px">
        ${transactions.map((tx,i)=>`<div onclick="toggleSyncCheck(${i})" id="sync-row-${i}" style="display:flex;align-items:center;gap:12px;padding:13px 16px;border-bottom:${i<transactions.length-1?`1px solid ${C.border}`:"none"};cursor:pointer;transition:opacity 0.18s">
          <div id="sync-chk-${i}" style="width:22px;height:22px;border-radius:6px;border:2px solid ${acc.primary};background:${acc.primary};display:flex;align-items:center;justify-content:center;flex-shrink:0"><span style="color:white;font-size:12px;font-weight:900">✓</span></div>
          <span style="font-size:20px;flex-shrink:0">${CAT_ICONS[tx.category]||"💳"}</span>
          <div style="flex:1;min-width:0"><div style="font-weight:700;font-size:14px;color:${C.textPrimary};overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${tx.merchant}</div><div style="font-size:11px;color:${C.textSecondary}">${tx.category} · ${tx.date}</div></div>
          <div style="font-weight:800;color:${tx.amount<0?C.danger:C.success};flex-shrink:0">${tx.amount>0?"+":""}${fmt(Math.abs(tx.amount))}</div>
        </div>`).join("")}
      </div>
      <button id="sync-approve-btn" onclick="approveSyncTransactions()" style="width:100%;padding:16px;border:none;border-radius:18px;background:${acc.grad};color:white;font-weight:800;font-size:16px;cursor:pointer;font-family:inherit">${t.approve} (${transactions.length})</button>`;

  const html=`<div id="sync-overlay" onclick="if(event.target.id==='sync-overlay')this.remove()" style="position:fixed;inset:0;background:rgba(15,23,42,0.7);z-index:8000;display:flex;align-items:flex-end;justify-content:center;backdrop-filter:blur(4px)">
    <div onclick="event.stopPropagation()" style="background:${C.surface};border-radius:28px 28px 0 0;padding:28px 24px 40px;width:100%;max-width:500px;max-height:85vh;display:flex;flex-direction:column;animation:slideUp 0.28s cubic-bezier(.4,0,.2,1)">
      ${body}
    </div>
  </div>`;
  document.body.insertAdjacentHTML("beforeend",html);
  window._syncTxs=transactions;
  window._syncChecked=transactions.map(()=>true);
}

function toggleSyncCheck(i){
  window._syncChecked[i]=!window._syncChecked[i];
  const acc=getAccent();
  const row=document.getElementById(`sync-row-${i}`);
  const chk=document.getElementById(`sync-chk-${i}`);
  if(row)row.style.opacity=window._syncChecked[i]?"1":"0.45";
  if(chk){chk.style.background=window._syncChecked[i]?acc.primary:"transparent";chk.style.borderColor=window._syncChecked[i]?acc.primary:C.border;chk.innerHTML=window._syncChecked[i]?`<span style="color:white;font-size:12px;font-weight:900">✓</span>`:""}
  const sel=window._syncTxs.filter((_,idx)=>window._syncChecked[idx]);
  const btn=document.getElementById("sync-approve-btn");
  if(btn)btn.textContent=`${getT2().approve} (${sel.length})`;
}

function approveSyncTransactions(){
  const selected=(window._syncTxs||[]).filter((_,i)=>(window._syncChecked||[])[i]);
  const addedSpend=selected.filter(t=>t.amount<0).reduce((s,t)=>s+Math.abs(t.amount),0);
  const addedIncome=selected.filter(t=>t.amount>0).reduce((s,t)=>s+t.amount,0);
  STATE.transactions=[...selected.map(t=>({...t,bankId:"b1"})),...STATE.transactions];
  STATE.finances.spent+=addedSpend;
  STATE.banks[0].balance+=addedIncome-addedSpend;
  STATE.snapshotDate=new Date().toLocaleDateString("en-US");
  if(addedSpend>200)STATE.insights=[{type:"SPENDING_SURGE",category:"New Upload",pct:Math.round((addedSpend/STATE.finances.monthlyBudget)*100)}];
  const overlay=document.getElementById("sync-overlay");
  if(overlay){
    overlay.querySelector("div").innerHTML=`<div style="text-align:center;padding:20px 0"><div style="font-size:52px;margin-bottom:12px">✅</div><div style="font-weight:800;font-size:18px;color:${C.textPrimary}">${getT2().syncSuccess}</div></div>`;
    setTimeout(()=>{overlay.remove();navTo("home");},1500);
  }
}

function openDrawer(){
  const t=getT2(),acc=getAccent();
  const links=[{id:"home",icon:"🏠",label:t.home},{id:"activity",icon:"📋",label:t.activity},{id:"stats",icon:"📊",label:t.stats},{id:"settings",icon:"⚙️",label:t.settings}];
  const linksHtml=links.map(l=>`<div class="drawer-link" onclick="navTo('${l.id}');document.getElementById('drawer-overlay').remove()"><span style="font-size:20px">${l.icon}</span><span style="font-weight:600;font-size:15px">${l.label}</span></div>`).join("");
  const html=`<div id="drawer-overlay" onclick="if(event.target.id==='drawer-overlay')this.remove()" style="position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:8000;backdrop-filter:blur(4px);animation:fadeIn 0.2s ease">
    <div onclick="event.stopPropagation()" style="position:absolute;top:0;left:0;bottom:0;width:270px;background:${C.surface};border-right:1px solid ${C.border};display:flex;flex-direction:column;padding-bottom:32px;box-shadow:6px 0 40px rgba(108,31,201,0.15)">
      <div onclick="document.getElementById('drawer-overlay').remove();openProfileForm()" style="padding:52px 24px 24px;border-bottom:1px solid ${C.border};cursor:pointer;transition:background 0.15s" onmouseover="this.style.background='${C.bg}'" onmouseout="this.style.background='transparent'">
        <div style="display:flex;align-items:center;gap:14px">
          <div style="width:46px;height:46px;border-radius:50%;background:${acc.grad};display:flex;align-items:center;justify-content:center;color:white;font-weight:800;font-size:16px">${STATE.profile.avatar}</div>
          <div style="flex:1"><div style="color:${C.textPrimary};font-weight:800;font-size:15px">${STATE.profile.name}</div>${gradBadge("Premium ✦")}</div>
          <span style="font-size:14px;color:${C.textMuted}">✏️</span>
        </div>
        <div style="font-size:11px;color:${C.textSecondary};margin-top:6px">${t.editProfile}</div>
      </div>
      <div style="flex:1;padding:16px 12px">${linksHtml}</div>
      <div style="padding:0 24px;font-size:11px;color:${C.textMuted};text-align:center">SimpleFinance v4.0</div>
    </div>
  </div>`;
  document.body.insertAdjacentHTML("beforeend",html);
}

// ═══════════════════════════════════════════════
// MAIN RENDER
// ═══════════════════════════════════════════════
function render(){
  if(STATE.isDeleted){
    document.getElementById("app").innerHTML=`<div style="min-height:100vh;background:${C.bg};display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px;text-align:center"><div style="font-size:64px;margin-bottom:20px">🗑️</div><h2 style="color:${C.textPrimary};font-weight:800;font-size:22px;margin:0 0 10px">Account Deleted</h2><p style="color:${C.textSecondary};font-size:14px;line-height:1.6;max-width:280px">Your account and all associated data have been permanently and securely deleted.</p></div>`;
    return;
  }
  const t=getT2(),acc=getAccent();
  const isRtl=isRTL();
  const screens={home:renderDashboard,activity:renderActivity,stats:renderStats,settings:renderSettings};
  const tab=STATE.tab;
  const navItems=[{id:"home",label:t.home,icon:"🏠"},{id:"activity",label:t.activity,icon:"📋"},{id:"stats",label:t.stats,icon:"📊"},{id:"settings",label:t.settings,icon:"⚙️"}];
  const screenContent=(screens[tab]||renderDashboard)();
  const navLeft=navItems.slice(0,2).map(item=>`<button class="nav-btn" onclick="navTo('${item.id}')" style="color:${tab===item.id?acc.primary:C.textMuted}"><span style="font-size:22px">${item.icon}</span>${item.label}</button>`).join("");
  const navRight=navItems.slice(2).map(item=>`<button class="nav-btn" onclick="navTo('${item.id}')" style="color:${tab===item.id?acc.primary:C.textMuted}"><span style="font-size:22px">${item.icon}</span>${item.label}</button>`).join("");
  const nowDate=new Date().toLocaleDateString(isRtl?"he-IL":"en-US",{weekday:"long",month:"long",day:"numeric"});

  document.getElementById("app").innerHTML=`
  <div style="background:${C.bg};min-height:100vh;direction:${isRtl?"rtl":"ltr"}">
    <main style="max-width:480px;margin:0 auto;padding:20px 16px ${C.navH+50}px">
      <header style="margin-bottom:22px;display:flex;justify-content:space-between;align-items:center">
        <div style="display:flex;align-items:center;gap:10px">
          ${STATE.history.length>0
            ?`<button onclick="goBack()" style="background:${C.surface};border:1px solid ${C.border};border-radius:12px;width:36px;height:36px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:18px;color:${C.textPrimary};box-shadow:0 2px 12px rgba(108,31,201,0.07);flex-shrink:0">${isRtl?"›":"‹"}</button>`
            :`<button onclick="openDrawer()" style="background:none;border:none;cursor:pointer;padding:6px;display:flex;flex-direction:column;gap:5px;align-items:flex-start">${[0,1,2].map(i=>`<div style="width:22px;height:2px;background:${C.textSecondary};border-radius:2px"></div>`).join("")}</button>`}
          <div>
            <div style="font-size:11px;color:${C.textMuted};font-weight:600;letter-spacing:0.5px;text-transform:uppercase">${nowDate}</div>
            <h1 style="margin:4px 0 0;font-size:22px;font-weight:800;color:${C.textPrimary}">${navItems.find(i=>i.id===tab)?.label||""}</h1>
          </div>
        </div>
        <div onclick="navTo('settings')" style="width:40px;height:40px;border-radius:50%;background:${acc.grad};display:flex;align-items:center;justify-content:center;color:white;font-weight:800;font-size:14px;box-shadow:0 3px 10px ${acc.primary}44;cursor:pointer">${STATE.profile.avatar}</div>
      </header>
      ${screenContent}
    </main>
    <nav style="position:fixed;bottom:0;left:0;right:0;height:${C.navH}px;z-index:1000;background:${C.surface};border-top:1px solid ${C.border};box-shadow:0 -4px 20px rgba(108,31,201,0.08);display:flex;align-items:center">
      <div style="flex:1;display:flex;justify-content:space-evenly">${navLeft}</div>
      <div style="width:72px;flex-shrink:0"></div>
      <div style="flex:1;display:flex;justify-content:space-evenly">${navRight}</div>
    </nav>
    <div style="position:fixed;bottom:0;left:50%;transform:translateX(-50%);z-index:4000;display:flex;flex-direction:column;align-items:center">
      <button id="fab-btn" onclick="openFAB()" style="width:56px;height:56px;border-radius:50%;background:${acc.grad};border:4px solid ${C.bg};color:white;font-size:26px;cursor:pointer;box-shadow:0 4px 20px ${acc.primary}66;display:flex;align-items:center;justify-content:center;margin-bottom:4px;flex-shrink:0;line-height:1;font-family:inherit;transition:transform 0.25s">+</button>
    </div>
    <input type="file" id="file-input" accept=".pdf,application/pdf" style="display:none" onchange="if(this.files[0])handleFileUpload(this.files[0]);this.value=''"/>
    <input type="file" id="photo-input" accept="image/*" style="display:none" onchange="if(this.files[0])handleFileUpload(this.files[0]);this.value=''"/>
  </div>`;

  // bind toggle
  document.querySelectorAll("[data-toggle]").forEach(el=>{
    el.onclick=()=>{STATE.isPrivacy=!STATE.isPrivacy;render();};
  });
  document.querySelectorAll("[data-bankfilter]").forEach(el=>{
    el.onclick=()=>{STATE.selectedBankId=el.dataset.bankfilter;render();};
  });
  document.querySelectorAll("[data-range]").forEach(el=>{
    el.onclick=()=>{
      const rd=RANGE_DATA[el.dataset.range]||RANGE_DATA.month;
      STATE.timeRange=el.dataset.range;
      STATE.monthlyData=rd.monthlyData;
      STATE.finances={...STATE.finances,spent:rd.spent};
      render();
    };
  });
}

render();
</script>
</body>
</html>
